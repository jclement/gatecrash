version: 2
project_name: gatecrash

before:
  hooks:
    - go mod tidy

builds:
  - id: gatecrash-server
    main: ./cmd/gatecrash-server
    binary: gatecrash-server
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.Version={{.Version}}

  - id: gatecrash
    main: ./cmd/gatecrash
    binary: gatecrash
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.Version={{.Version}}

archives:
  - id: gatecrash-server
    builds: [gatecrash-server]
    name_template: "gatecrash-server_{{ .Os }}_{{ .Arch }}"
    format: binary

  - id: gatecrash
    builds: [gatecrash]
    name_template: "gatecrash_{{ .Os }}_{{ .Arch }}"
    format: binary

  - id: gatecrash-server-homebrew
    builds: [gatecrash-server]
    name_template: "gatecrash-server_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz

  - id: gatecrash-homebrew
    builds: [gatecrash]
    name_template: "gatecrash_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz

brews:
  - ids: [gatecrash-server-homebrew]
    name: gatecrash-server
    repository:
      owner: jclement
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/jclement/gatecrash
    description: Gatecrash tunnel server with admin panel and automatic TLS
    license: MIT
    install: |
      bin.install "gatecrash-server"

  - ids: [gatecrash-homebrew]
    name: gatecrash
    repository:
      owner: jclement
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/jclement/gatecrash
    description: Gatecrash tunnel client
    license: MIT
    install: |
      bin.install "gatecrash"

dockers_v2:
  - id: gatecrash-server
    ids: [gatecrash-server]
    dockerfile: Dockerfile.goreleaser
    images:
      - "ghcr.io/jclement/gatecrash-server"
    tags:
      - "{{ .Version }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64

  - id: gatecrash
    ids: [gatecrash]
    dockerfile: Dockerfile.goreleaser.client
    images:
      - "ghcr.io/jclement/gatecrash"
    tags:
      - "{{ .Version }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64

changelog:
  sort: asc
  filters:
    exclude: ["^docs:", "^test:", "^ci:", "^chore:"]

release:
  prerelease: auto
  footer: |
    ## Docker

    **Server:**
    ```bash
    docker pull ghcr.io/jclement/gatecrash-server:{{ .Version }}
    ```

    **Client:**
    ```bash
    docker pull ghcr.io/jclement/gatecrash:{{ .Version }}
    ```

    ## Quick Install (Linux Server)
    ```bash
    curl -fsSL https://raw.githubusercontent.com/jclement/gatecrash/main/deploy/install.sh | sh
    ```
