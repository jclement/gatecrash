{{define "content"}}
<div x-data="usersPage()" x-cloak class="max-w-3xl mx-auto px-4 py-6">
    <div class="flex items-center justify-between mb-3">
        <div>
            <h1 class="text-lg font-semibold">Users</h1>
            <p class="text-xs text-gray-500">Passkey users. Admins manage the panel; everyone can be granted tunnel access via an auth policy.</p>
        </div>
        <button @click="openNew()" class="text-sm bg-blue-600 text-white hover:bg-blue-700 px-3 py-1.5 rounded font-medium transition-colors">Add user</button>
    </div>

    <div class="bg-white rounded-lg shadow-sm border border-gray-200">
        <table x-show="users.length > 0" class="w-full text-sm">
            <tbody>
                <template x-for="u in users" :key="u.id">
                    <tr class="border-b border-gray-100 last:border-0 hover:bg-gray-50">
                        <td class="px-4 py-2">
                            <div class="font-semibold" x-text="u.name"></div>
                            <div class="text-[10px] text-gray-400 font-mono" x-text="u.id"></div>
                        </td>
                        <td class="px-4 py-2">
                            <span class="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-medium"
                                  :class="u.role === 'admin' ? 'bg-purple-100 text-purple-700' : 'bg-gray-100 text-gray-600'"
                                  x-text="u.role"></span>
                            <span x-show="u.id === me" class="ml-1 text-[10px] text-gray-400">(you)</span>
                        </td>
                        <td class="px-4 py-2 text-xs text-gray-500">
                            <span x-show="u.has_passkeys" x-text="u.passkeys + ' passkey' + (u.passkeys===1?'':'s')"></span>
                            <span x-show="!u.has_passkeys" class="text-amber-600">invite pending</span>
                        </td>
                        <td class="px-4 py-2 text-right space-x-1 whitespace-nowrap">
                            <button x-show="!u.has_passkeys && u.invite_url" @click="copy(u.invite_url)" class="text-xs bg-indigo-50 text-indigo-700 hover:bg-indigo-100 px-2 py-1 rounded font-medium">Copy invite</button>
                            <button @click="rename(u)" class="text-xs bg-gray-50 text-gray-700 hover:bg-gray-100 px-2 py-1 rounded font-medium">Rename</button>
                            <button x-show="u.has_passkeys" @click="reset(u.id)" class="text-xs bg-amber-50 text-amber-700 hover:bg-amber-100 px-2 py-1 rounded font-medium">Reset</button>
                            <button x-show="u.id !== me" @click="toggleRole(u)" class="text-xs bg-gray-50 text-gray-700 hover:bg-gray-100 px-2 py-1 rounded font-medium" x-text="u.role === 'admin' ? 'Make user' : 'Make admin'"></button>
                            <button x-show="u.id !== me" @click="del(u.id)" class="text-xs bg-red-50 text-red-700 hover:bg-red-100 px-2 py-1 rounded font-medium">Delete</button>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>

    <!-- New user modal -->
    <div x-show="modal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center">
        <div class="absolute inset-0 bg-black/50" @click="modal = false"></div>
        <div class="relative bg-white rounded-lg shadow-xl max-w-md w-full mx-4" @click.stop>
            <div class="px-5 py-4 border-b border-gray-200 flex items-center justify-between">
                <h3 class="text-base font-semibold">Add user</h3>
                <button @click="modal = false" class="text-gray-400 hover:text-gray-600 text-lg">&times;</button>
            </div>
            <div class="px-5 py-4 space-y-3">
                <template x-if="!inviteUrl">
                    <div class="space-y-3">
                        <div>
                            <label class="block text-xs font-medium text-gray-600 mb-1">Name</label>
                            <input type="text" x-model="newName" placeholder="Alice" class="w-full border border-gray-300 rounded px-2 py-1.5 text-sm">
                            <p class="text-xs text-gray-400 mt-1">A display label, injected as the identity header. You can rename it later; the user keeps a stable internal id.</p>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-600 mb-1">Role</label>
                            <select x-model="newRole" class="w-full border border-gray-300 rounded px-2 py-1.5 text-sm">
                                <option value="user">User</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                    </div>
                </template>
                <template x-if="inviteUrl">
                    <div class="space-y-2">
                        <p class="text-sm text-gray-600">Share this one-time invite link so they can register a passkey:</p>
                        <div class="flex items-center gap-1.5">
                            <input type="text" readonly :value="inviteUrl" @focus="$event.target.select()" class="flex-1 border border-gray-300 rounded px-2 py-1.5 text-xs font-mono bg-gray-50">
                            <button @click="copy(inviteUrl)" class="text-xs bg-gray-100 text-gray-700 hover:bg-gray-200 px-2 py-1.5 rounded font-medium">Copy</button>
                        </div>
                    </div>
                </template>
            </div>
            <div class="px-5 py-3 border-t border-gray-200 flex justify-end gap-2">
                <button @click="modal = false" class="px-3 py-1.5 text-sm rounded border border-gray-300 hover:bg-gray-50" x-text="inviteUrl ? 'Done' : 'Cancel'"></button>
                <button x-show="!inviteUrl" @click="create()" class="px-3 py-1.5 text-sm rounded bg-blue-600 text-white hover:bg-blue-700">Create &amp; invite</button>
            </div>
        </div>
    </div>
</div>

<script>
function usersPage() {
    const csrf = () => document.querySelector('meta[name="csrf-token"]')?.content || '';
    const headers = () => ({ 'X-CSRF-Token': csrf(), 'Content-Type': 'application/json' });
    return {
        me: '{{.UserID}}',
        users: [], modal: false, newName: '', newRole: 'user', inviteUrl: '',
        init() { this.load(); },
        async load() {
            const r = await fetch('/api/users');
            if (r.status === 401) { window.location.href = '/login'; return; }
            if (r.ok) this.users = (await r.json()) || [];
        },
        openNew() { this.newName = ''; this.newRole = 'user'; this.inviteUrl = ''; this.modal = true; },
        async create() {
            const r = await fetch('/api/users', { method: 'POST', headers: headers(), body: JSON.stringify({ name: this.newName.trim(), role: this.newRole }) });
            if (r.status === 401) { window.location.href = '/login'; return; }
            if (!r.ok) { alert('Error: ' + await r.text()); return; }
            this.inviteUrl = (await r.json()).invite_url || '';
            this.load();
        },
        async rename(u) {
            const name = prompt('New name for this user:', u.name);
            if (name === null || name.trim() === '' || name.trim() === u.name) return;
            const r = await fetch('/api/users/' + encodeURIComponent(u.id) + '/rename', { method: 'POST', headers: headers(), body: JSON.stringify({ name: name.trim() }) });
            if (!r.ok) { alert('Failed: ' + await r.text()); return; }
            this.load();
        },
        async reset(id) {
            if (!confirm('Reset "' + id + '"? This removes all their passkeys and issues a new invite.')) return;
            const r = await fetch('/api/users/' + encodeURIComponent(id) + '/reset', { method: 'POST', headers: headers() });
            if (!r.ok) { alert('Failed: ' + await r.text()); return; }
            const url = (await r.json()).invite_url;
            this.load();
            if (url) prompt('New invite link (copy it):', url);
        },
        async toggleRole(u) {
            const role = u.role === 'admin' ? 'user' : 'admin';
            const r = await fetch('/api/users/' + encodeURIComponent(u.id) + '/role', { method: 'POST', headers: headers(), body: JSON.stringify({ role }) });
            if (!r.ok) { alert('Failed: ' + await r.text()); return; }
            this.load();
        },
        async del(id) {
            if (!confirm('Delete user "' + id + '"?')) return;
            const r = await fetch('/api/users/' + encodeURIComponent(id), { method: 'DELETE', headers: headers() });
            if (!r.ok) { alert('Failed: ' + await r.text()); return; }
            this.load();
        },
        copy(text) { navigator.clipboard?.writeText(text).then(() => {}).catch(() => {}); },
    };
}
</script>
{{end}}
