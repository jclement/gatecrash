{{define "content"}}
<div x-data="passkeysPage()" class="max-w-3xl mx-auto">
    <div class="flex justify-between items-center mb-1">
        <h1 class="text-lg font-bold">Your passkeys</h1>
        <button id="register-btn" onclick="doRegister('/auth/register/begin', '/auth/register/finish', 'register-btn')"
                class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-medium px-3 py-1.5 rounded transition-colors">
            Add passkey
        </button>
    </div>
    <p class="text-xs text-gray-500 mb-3">Signed in as <strong>{{.UserID}}</strong>{{if .IsAdmin}} (admin){{end}}.</p>
    <p id="status" class="text-xs mb-3 text-gray-500"></p>

    <div class="bg-white rounded-lg border border-gray-200 overflow-hidden">
        <table class="w-full text-sm responsive-table">
            <thead>
                <tr class="border-b border-gray-200 bg-gray-50">
                    <th class="text-left px-3 py-2 text-xs font-medium text-gray-500 uppercase tracking-wide">Name</th>
                    <th class="text-left px-3 py-2 text-xs font-medium text-gray-500 uppercase tracking-wide">Created</th>
                    <th class="text-left px-3 py-2 text-xs font-medium text-gray-500 uppercase tracking-wide">Last Used</th>
                    <th class="px-3 py-2"></th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
                {{range .Data.Passkeys}}
                <tr class="hover:bg-gray-50">
                    <td class="px-3 py-2 font-medium" data-label="Name">{{.Name}}</td>
                    <td class="px-3 py-2 text-xs text-gray-500" data-label="Created">{{.CreatedAt}}</td>
                    <td class="px-3 py-2 text-xs text-gray-500" data-label="Last Used">{{.LastUsedAt}}</td>
                    <td class="px-3 py-2 text-right card-actions">
                        {{if $.Data.CanDelete}}
                        <button @click="remove('{{.IDB64}}')" class="text-xs bg-red-50 text-red-700 hover:bg-red-100 px-2 py-1 rounded font-medium transition-colors">Remove</button>
                        {{else}}
                        <span data-tip="Cannot remove your last passkey">
                            <button disabled class="text-xs bg-gray-100 text-gray-400 px-2 py-1 rounded cursor-not-allowed pointer-events-none">Remove</button>
                        </span>
                        {{end}}
                    </td>
                </tr>
                {{else}}
                <tr class="empty-row">
                    <td colspan="4" class="px-3 py-6 text-center text-gray-400">No passkeys registered.</td>
                </tr>
                {{end}}
            </tbody>
        </table>
    </div>
</div>

<script src="/static/js/webauthn.js"></script>
<script>
function passkeysPage() {
    const csrf = () => document.querySelector('meta[name="csrf-token"]')?.content || '';
    return {
        async remove(id) {
            if (!confirm('Remove this passkey? You won\'t be able to sign in with it.')) return;
            const resp = await fetch('/api/passkeys/delete', {
                method: 'POST',
                headers: { 'X-CSRF-Token': csrf(), 'Content-Type': 'application/json' },
                body: JSON.stringify({ id }),
            });
            if (resp.status === 401) { window.location.href = '/login'; return; }
            if (!resp.ok) { alert('Failed: ' + await resp.text()); return; }
            window.location.reload();
        },
    };
}
</script>
{{end}}
